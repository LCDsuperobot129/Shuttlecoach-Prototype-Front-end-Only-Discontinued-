<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Manrope:wght@200..800&display=swap" rel="stylesheet">

  <title>Shotmap</title>
</head>
<body>
  <!-- From Uiverse.io by jaykdoe --> 
  <div class="container">
    <div id="stars"></div>
    <div id="stars2"></div>
    <div id="stars3"></div>
    <div></div>
  </div>

  <h1 class="Shotmap">Shotmap</h1>

  <h2 class="opponentSide">Opponent's Side</h2>

  <div>
    <img class="court" id="courtImg" src="Court.png" alt="Badminton Court">
    <canvas id="heatmap"></canvas>
  </div>

  <h2 class="yourSide">Your Side</h2>

  <script>
    const img = document.getElementById('courtImg');
    const canvas = document.getElementById('heatmap');
    const ctx = canvas.getContext('2d');
    const circles = [];

    function sync() {
      const r = img.getBoundingClientRect();
      canvas.style.left = r.left + 'px';
      canvas.style.top = r.top + 'px';
      canvas.style.width = r.width + 'px';
      canvas.style.height = r.height + 'px';
      canvas.width = r.width;
      canvas.height = r.height;
      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const c of circles) {
        ctx.beginPath();
        ctx.arc(c.x * canvas.width, c.y * canvas.height, 15, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 0, 0, 0.25)';
        ctx.fill();
      }
    }

    img.addEventListener('click', (e) => {
      const r = img.getBoundingClientRect();
      circles.push({
        x: (e.clientX - r.left) / r.width,
        y: (e.clientY - r.top) / r.height,
      });
      draw();
    });

    window.addEventListener('resize', sync);
    img.addEventListener('load', sync);
    if (img.complete) sync();
  </script>
</body>
</html>
