name: shuttlecoach
description: "A cross-platform AI Badminton Game Reviewer App built with Flutter."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  
  # HTTP & API
  dio: ^5.3.1
  retrofit: ^4.1.0
  
  # Serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.1
  
  # Video & Media
  video_player: ^2.8.1
  image_picker: ^1.0.4
  
  # UI & Animation
  flutter_animate: ^4.2.0
  smooth_page_indicator: ^1.1.0
  
  # Utilities
  intl: ^0.19.0
  get_it: ^7.6.0
  
  # Logging
  logger: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  retrofit_generator: ^7.0.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/strings/
  
  # Fonts (add custom fonts here when available)
  fonts:
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/GoogleSans-VariableFont_GRAD,opsz,wght.ttf
  #       - asset: assets/fonts/Roboto-Bold.ttf
  #         weight: 700
